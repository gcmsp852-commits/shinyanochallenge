<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>QRツイン リーダー</title>

<script src="./zxing.min.js"></script>

<style>
body{
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  margin:0;padding:0;background:#121212;color:#fff;text-align:center;
}
h2{margin:15px 0;font-size:1.2rem;}
#startScreen,#resultScreen{padding:20px;margin-top:50px;}
#resultScreen{display:none;}
.camera-container{position:relative;width:100%;max-width:600px;margin:0 auto;background:#000;display:none;}
video{width:100%;display:block;object-fit:cover;}
.status-panel{padding:15px;background:#1e1e1e;border-top:1px solid #333;text-align:left;max-width:600px;margin:0 auto;display:none;}
.qr-result{margin-bottom:10px;padding:10px;border-radius:8px;background:#2c2c2c;word-break:break-all;}
.qr-1{border-left:5px solid #00E676;}
.qr-2{border-left:5px solid #29B6F6;}
button{width:100%;max-width:300px;padding:15px;font-size:1.1rem;font-weight:bold;background:#6200EE;color:#fff;border:none;border-radius:8px;margin-top:10px;}
#startBtn{background:#81C784;color:#121212;}
#backBtn{background:#03DAC6;color:#000;margin-top:30px;}
</style>
</head>

<body>

<h2>📱 QRツイン リーダー</h2>

<div id="startScreen">
  <p style="color:#aaa;font-size:0.9rem;margin-bottom:20px;">
    2つのQRコードを同時に、または連続して読み取ります。
  </p>
  <button id="startBtn" onclick="startApp()">📷 カメラを起動する</button>
</div>

<div class="camera-container" id="cameraContainer">
  <video id="video" playsinline autoplay muted></video>
</div>

<div class="status-panel" id="statusPanel">
  <div id="detectorInfo" style="font-size:0.8rem;color:#aaa;margin-bottom:10px;">
    読取エンジン準備中...
  </div>
  <div class="qr-result qr-1"><strong>1個目:</strong> <span id="text1">未検出</span></div>
  <div class="qr-result qr-2"><strong>2個目:</strong> <span id="text2">未検出</span></div>
</div>

<div id="resultScreen">
  <h3 style="color:#00E676;margin-bottom:20px;">✅ 読み取り完了！</h3>
  <div class="qr-result qr-1"><strong>1個目:</strong><br><span id="finalText1"></span></div>
  <div class="qr-result qr-2"><strong>2個目:</strong><br><span id="finalText2"></span></div>
  <button id="backBtn" onclick="goBack()">🔙 もとのカメラ画面に戻る</button>
</div>

<script>
// =============================
// 変数
// =============================
const video = document.getElementById('video');

let reader = null;
let firstQR = null;
let secondQR = null;

// =============================
// アプリ開始
// =============================
async function startApp() {
  const btn = document.getElementById('startBtn');
  btn.disabled = true;
  btn.innerText = "準備中...";

  await initZXing();
  const ok = await startCamera();

  if (ok) {
    document.getElementById('startScreen').style.display='none';
    document.getElementById('cameraContainer').style.display='block';
    document.getElementById('statusPanel').style.display='block';
  } else {
    btn.disabled=false;
    btn.innerText="📷 カメラを起動する";
  }
}

// =============================
// ZXing 初期化（高精度設定）
// =============================
async function initZXing(){
  if(typeof ZXing==='undefined'){
    alert("ZXingが読み込めません");
    return;
  }

  const hints=new Map();
  hints.set(ZXing.DecodeHintType.POSSIBLE_FORMATS,[ZXing.BarcodeFormat.QR_CODE]);
  hints.set(ZXing.DecodeHintType.TRY_HARDER,true);

  reader=new ZXing.BrowserMultiFormatReader(hints);
  reader.timeBetweenDecodingAttempts=50;

  document.getElementById('detectorInfo').innerText="🐢 ZXing 高精度モード";
}

// =============================
// カメラ起動
// =============================
async function startCamera(){
  try{
    const stream=await navigator.mediaDevices.getUserMedia({
      video:{
        facingMode:{ideal:"environment"},
        width:{ideal:1280},
        height:{ideal:720}
      },
      audio:false
    });

    video.srcObject=stream;
    await video.play();

    startContinuousDecode();
    return true;

  }catch(e){
    alert("カメラ起動失敗: "+e.message);
    return false;
  }
}

// =============================
// ★最重要：ZXing連続デコード
// =============================
function startContinuousDecode(){
  const info=document.getElementById('detectorInfo');

  info.innerText="🔎 高精度スキャン中…";

  reader.decodeFromVideoElementContinuously(video,(result,err)=>{
    if(result){
      const text=result.getText();

      let pts=[];
      try{
        const rps=result.getResultPoints()||[];
        pts=rps.map(p=>({x:p.getX(),y:p.getY()}));
      }catch(_){}

      processDetections([{text,points:pts,center:getCenter(pts)}]);
    }

    if(err && err.name!=="NotFoundException"){
      console.warn(err);
    }
  });
}

// =============================
// 検出処理（ツイン対応）
// =============================
function processDetections(items){
  if(!items.length)return;

  if(!firstQR){
    firstQR=items[0];
    document.getElementById('text1').innerText=firstQR.text;
    return;
  }

  if(!secondQR && items[0].text!==firstQR.text){
    secondQR=items[0];
    document.getElementById('text2').innerText=secondQR.text;
    showResultScreen();
  }
}

function getCenter(points){
  if(!points||!points.length)return{x:0,y:0};
  let sx=0,sy=0;
  points.forEach(p=>{sx+=p.x;sy+=p.y});
  return{x:sx/points.length,y:sy/points.length};
}

// =============================
// 結果表示
// =============================
function showResultScreen(){
  if(navigator.vibrate)navigator.vibrate([40,30,40]);

  document.getElementById('cameraContainer').style.display='none';
  document.getElementById('statusPanel').style.display='none';
  document.getElementById('resultScreen').style.display='block';

  document.getElementById('finalText1').innerText=firstQR.text;
  document.getElementById('finalText2').innerText=secondQR.text;
}

// =============================
// 戻る
// =============================
function goBack(){
  firstQR=null;
  secondQR=null;

  document.getElementById('text1').innerText="未検出";
  document.getElementById('text2').innerText="未検出";

  document.getElementById('resultScreen').style.display='none';
  document.getElementById('cameraContainer').style.display='block';
  document.getElementById('statusPanel').style.display='block';

  startContinuousDecode();
}
</script>
</body>
</html>
