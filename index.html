<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>QRツイン リーダー</title>
    <meta name="apple-mobile-web-app-title" content="QRツイン">
    <meta name="application-name" content="QRツイン">

    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">

    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#121212">

    <link rel="apple-touch-icon" sizes="180x180" href="icon.png">
    <link rel="icon" type="image/png" sizes="512x512" href="icon.png">
    <link rel="manifest" href="manifest.json">
    <script src="./zxing.min.js"></script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            margin: 0; padding: 0; background-color: #121212; color: #ffffff; text-align: center;
        }
        h2 { margin: 15px 0; font-size: 1.2rem; }
        
        #startScreen, #resultScreen { padding: 20px; margin-top: 50px; }
        #resultScreen { display: none; }

        .camera-container {
            position: relative; width: 100%; max-width: 600px; margin: 0 auto; background: #000; display: none;
        }
        video { width: 100%; display: block; object-fit: cover; }
        canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; }
        
        .status-panel {
            padding: 15px; background: #1e1e1e; border-top: 1px solid #333; text-align: left; max-width: 600px; margin: 0 auto; display: none;
        }
        
        .qr-result { margin-bottom: 10px; padding: 10px; border-radius: 8px; background: #2c2c2c; word-break: break-all; }
        .qr-1 { border-left: 5px solid #00E676; }
        .qr-2 { border-left: 5px solid #29B6F6; }
        
        button {
            width: 100%; max-width: 300px; padding: 15px; font-size: 1.1rem; font-weight: bold; 
            background: #6200EE; color: white; border: none; border-radius: 8px; cursor: pointer; margin-top: 10px;
        }
        button:disabled { background: #555; cursor: not-allowed; color: #aaa; }
        
        #startBtn { background: #81C784; color: #121212; } 
        #startBtn:active { background: #66BB6A; }
        
        #backBtn { background: #03DAC6; color: #000; margin-top: 30px; }
        #backBtn:active { background: #018786; }
    </style>
</head>
<body>

    <h2>📱 QRツイン リーダー</h2>
    
    <div id="startScreen">
        <p style="color: #aaa; font-size: 0.9rem; margin-bottom: 20px;">
            2つのQRコードを同時に、または連続して読み取ります。
        </p>
        <button id="startBtn" onclick="startApp()">📷 カメラを起動する</button>
    </div>

    <div class="camera-container" id="cameraContainer">
        <video id="video" playsinline autoplay muted></video>
        <canvas id="overlayCanvas"></canvas>
    </div>

    <div class="status-panel" id="statusPanel">
        <div id="detectorInfo" style="font-size: 0.8rem; color: #aaa; margin-bottom: 10px;">読取エンジン準備中...</div>
        <div class="qr-result qr-1">
            <strong>1個目:</strong> <span id="text1">未検出</span>
        </div>
        <div class="qr-result qr-2">
            <strong>2個目:</strong> <span id="text2">未検出</span>
        </div>
    </div>

    <div id="resultScreen">
        <h3 style="color: #00E676; margin-bottom: 20px;">✅ 読み取り完了！</h3>
        <div class="qr-result qr-1" style="text-align: left;">
            <strong>1個目:</strong><br> <span id="finalText1"></span>
        </div>
        <div class="qr-result qr-2" style="text-align: left;">
            <strong>2個目:</strong><br> <span id="finalText2"></span>
        </div>
        <button id="backBtn" onclick="goBack()">🔙 もとのカメラ画面に戻る</button>
    </div>

<script>
    const video = document.getElementById('video');
    const overlayCanvas = document.getElementById('overlayCanvas');
    const ctx = overlayCanvas.getContext('2d');
    
    const zxingCanvas = document.createElement('canvas');
    const zxingCtx = zxingCanvas.getContext('2d', { willReadFrequently: true });

    let isProcessing = false;
    let isScanning = false;
    let lastDetectTime = 0;
    // ▼ スキャン間隔を短縮してレスポンス向上
    const SCAN_INTERVAL_MS = 150; 
    
    let zxingMultiReader = null;

    let firstQR = null;
    let secondQR = null;

    async function startApp() {
        const startBtn = document.getElementById('startBtn');
        startBtn.disabled = true;
        startBtn.innerText = "準備中...";

        try {
            await initEngines();
            const success = await startCamera();
            
            if (success) {
                document.getElementById('startScreen').style.display = 'none';
                document.getElementById('cameraContainer').style.display = 'block';
                document.getElementById('statusPanel').style.display = 'block';
            } else {
                throw new Error("カメラの起動処理が中断されました。");
            }
        } catch (error) {
            alert("エラー: " + error.message);
            startBtn.disabled = false;
            startBtn.innerText = "📷 カメラを起動する";
        }
    }

    async function initEngines() {
        if (typeof ZXing === 'undefined') {
            throw new Error("ZXingライブラリが読み込めません。zxing.min.jsが同じ場所にあるか確認してください。");
        }

        if (ZXing.BrowserMultiFormatReader) {
            zxingMultiReader = new ZXing.BrowserMultiFormatReader();
        } else if (ZXing.qrcode && ZXing.qrcode.QRCodeMultiReader) {
            zxingMultiReader = new ZXing.qrcode.QRCodeMultiReader();
        } else {
            throw new Error("対応するZXingの読み取りクラスが見つかりません。");
        }
        
        document.getElementById('detectorInfo').innerText = "🐢 エンジン: ZXing (ローカル・チューニング済)";
    }

    async function startCamera() {
        if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
            alert("【警告】カメラAPIがブロックされています。\nAndroidではローカルファイル（file://）からカメラを起動できません。GitHub Pages等のHTTPS環境で開いてください。");
            return false;
        }

        try {
            // ▼ 画質指定とオートフォーカスの強制設定を追加
            const stream = await navigator.mediaDevices.getUserMedia({
                video: { 
                    facingMode: 'environment',
                    width: { ideal: 1280 },
                    height: { ideal: 720 },
                    advanced: [{ focusMode: "continuous" }] 
                }
            });
            video.srcObject = stream;
            
            await new Promise((resolve) => {
                video.onloadedmetadata = resolve;
                setTimeout(resolve, 1000); 
            });
            
            await video.play().catch(e => console.warn("自動再生ブロック:", e));
            
            isScanning = true;
            requestAnimationFrame(scanLoop);
            return true;
        } catch (err) {
            alert("カメラを起動できませんでした。\n権限を確認してください。\n詳細: " + err.message);
            return false;
        }
    }

    function getCenter(points) {
        if (!points || points.length === 0) return { x: 0, y: 0 };
        let sumX = 0, sumY = 0;
        points.forEach(p => { sumX += p.x; sumY += p.y; });
        return { x: sumX / points.length, y: sumY / points.length };
    }

    function getDistance(p1, p2) {
        return Math.sqrt(Math.pow(p1.x - p2.x, 2) + Math.pow(p1.y - p2.y, 2));
    }

    async function scanLoop() {
        if (!isScanning) return;

        if (video.videoWidth && overlayCanvas.width !== video.videoWidth) {
            overlayCanvas.width = video.videoWidth;
            overlayCanvas.height = video.videoHeight;
        }

        ctx.clearRect(0, 0, overlayCanvas.width, overlayCanvas.height);

        if (firstQR) drawBoundingBox(firstQR.points, '#00E676');
        if (secondQR) drawBoundingBox(secondQR.points, '#29B6F6');

        const now = Date.now();
        if (!isProcessing && now - lastDetectTime > SCAN_INTERVAL_MS && video.readyState >= 2) {
            isProcessing = true;
            lastDetectTime = now;
            let detectedItems = [];

            try {
                if (zxingMultiReader) {
                    // ▼ パフォーマンス向上のため、処理用Canvasを縮小（重いJS処理を軽くする）
                    const maxProcessWidth = 600; 
                    const scale = overlayCanvas.width > maxProcessWidth ? maxProcessWidth / overlayCanvas.width : 1;
                    
                    zxingCanvas.width = overlayCanvas.width * scale;
                    zxingCanvas.height = overlayCanvas.height * scale;
                    zxingCtx.drawImage(video, 0, 0, zxingCanvas.width, zxingCanvas.height);
                    
                    const luminanceSource = new ZXing.HTMLCanvasElementLuminanceSource(zxingCanvas);
                    const binaryBitmap = new ZXing.BinaryBitmap(new ZXing.HybridBinarizer(luminanceSource));
                    
                    // ▼ 精度向上のためのヒントを追加（TRY_HARDER）
                    const hints = new Map();
                    hints.set(ZXing.DecodeHintType.POSSIBLE_FORMATS, [ZXing.BarcodeFormat.QR_CODE]);
                    hints.set(ZXing.DecodeHintType.TRY_HARDER, true); 
                    
                    if (typeof zxingMultiReader.decodeMultiple === 'function') {
                        const results = zxingMultiReader.decodeMultiple(binaryBitmap, hints);
                        detectedItems = results.map(r => {
                            // 縮小して解析した座標を元のサイズに戻す
                            const pts = r.getResultPoints().map(p => ({ x: p.getX() / scale, y: p.getY() / scale }));
                            return { text: r.getText(), points: pts, center: getCenter(pts) };
                        });
                    } else if (typeof zxingMultiReader.decode === 'function' || typeof zxingMultiReader.decodeBitmap === 'function') {
                        // 単一のQR読み取り用フォールバック
                        const decodeFunc = zxingMultiReader.decode || zxingMultiReader.decodeBitmap;
                        const result = decodeFunc.call(zxingMultiReader, binaryBitmap, hints);
                        if (result) {
                            const pts = result.getResultPoints().map(p => ({ x: p.getX() / scale, y: p.getY() / scale }));
                            detectedItems = [{ text: result.getText(), points: pts, center: getCenter(pts) }];
                        }
                    }
                }
            } catch (err) {
                // ZXingはQRがないと例外を投げる仕様のため無視
            }

            processDetections(detectedItems);
            isProcessing = false;
        }

        if (firstQR && secondQR) {
            showResultScreen();
            isScanning = false;
            return;
        }

        requestAnimationFrame(scanLoop);
    }

    function processDetections(items) {
        if (items.length === 0) return;

        if (items.length >= 2) {
            if (!firstQR) {
                firstQR = items[0];
                secondQR = items[1];
                updateUI();
                return;
            }
            if (firstQR && !secondQR) {
                const dist0 = getDistance(firstQR.center, items[0].center);
                const dist1 = getDistance(firstQR.center, items[1].center);
                if (dist0 > dist1) {
                    secondQR = items[0];
                    firstQR = items[1]; 
                } else {
                    secondQR = items[1];
                    firstQR = items[0]; 
                }
                updateUI();
                return;
            }
        }

        if (items.length === 1) {
            const item = items[0];
            
            if (!firstQR) {
                firstQR = item;
                updateUI();
            } else if (!secondQR) {
                if (item.text !== firstQR.text) {
                    secondQR = item;
                    updateUI();
                } else {
                    const dist = getDistance(firstQR.center, item.center);
                    const qrSize = getDistance(item.points[0], item.points[1]);
                    
                    const distanceThreshold = Math.min(overlayCanvas.width * 0.1, qrSize * 0.45);

                    if (dist > distanceThreshold) {
                        secondQR = item;
                        updateUI();
                    } else {
                        firstQR.points = item.points;
                        firstQR.center = item.center;
                    }
                }
            }
        }
    }

    function updateUI() {
        if (firstQR) document.getElementById('text1').innerText = firstQR.text;
        if (secondQR) document.getElementById('text2').innerText = secondQR.text;
    }

    function formatResultText(text) {
        if (/^https?:\/\//i.test(text)) {
            return `<a href="${text}" target="_blank" rel="noopener noreferrer" style="color: #03DAC6; text-decoration: underline; font-weight: bold;">${text}</a>`;
        }
        const div = document.createElement('div');
        div.innerText = text;
        return div.innerHTML;
    }

    function showResultScreen() {
        if (navigator.vibrate) {
            navigator.vibrate([40, 30, 40]); 
        }

        document.getElementById('cameraContainer').style.display = 'none';
        document.getElementById('statusPanel').style.display = 'none';
        document.getElementById('resultScreen').style.display = 'block';
        
        document.getElementById('finalText1').innerHTML = formatResultText(firstQR.text);
        document.getElementById('finalText2').innerHTML = formatResultText(secondQR.text);
    }

    function goBack() {
        firstQR = null;
        secondQR = null;
        
        document.getElementById('text1').innerText = "未検出";
        document.getElementById('text2').innerText = "未検出";
        
        document.getElementById('resultScreen').style.display = 'none';
        document.getElementById('cameraContainer').style.display = 'block';
        document.getElementById('statusPanel').style.display = 'block';
        
        ctx.clearRect(0, 0, overlayCanvas.width, overlayCanvas.height);
        isScanning = true;
        requestAnimationFrame(scanLoop);
    }

    function drawBoundingBox(points, color) {
        if (!points || points.length < 3) return;
        ctx.beginPath();
        ctx.moveTo(points[0].x, points[0].y);
        for (let i = 1; i < points.length; i++) {
            ctx.lineTo(points[i].x, points[i].y);
        }
        ctx.closePath();
        ctx.lineWidth = 6;
        ctx.strokeStyle = color;
        ctx.stroke();
        ctx.fillStyle = color + '44'; 
        ctx.fill();
    }
</script>
</body>
</html>
